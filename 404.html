<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Beren Software</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 3l11 6.4v13.2L16 29 5 22.6V9.4z' fill='none' stroke='%2300f5ff' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
<link rel="stylesheet" href="https://fonts.bunny.net/css?family=inter:400,700,900|jetbrains-mono:400,700&display=swap">
<style>
  :root{--bg:#06060f;--text:#e2e8f0;--dim:#94a3b8;--cyan:#00f5ff;--pink:#ff00a0;--border:rgba(0,245,255,0.12)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;background-image:radial-gradient(ellipse at top,rgba(0,245,255,.06),transparent 60%),radial-gradient(ellipse at bottom,rgba(255,0,160,.04),transparent 60%)}
  .code{font-family:'JetBrains Mono',monospace;font-size:clamp(5rem,18vw,10rem);font-weight:900;line-height:1;letter-spacing:-.05em;background:linear-gradient(135deg,var(--cyan),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:18px}
  h1{font-size:1.6rem;font-weight:800;margin-bottom:14px;letter-spacing:-.01em}
  p{color:var(--dim);max-width:480px;margin-bottom:28px;line-height:1.65}
  .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  a.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:6px;font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;text-decoration:none;transition:transform .2s ease}
  a.btn:hover{transform:translateY(-1px)}
  .btn-primary{background:var(--cyan);color:var(--bg)}
  .btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{border-color:var(--cyan);color:var(--cyan)}
  .term{margin-top:48px;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--dim);opacity:.7}
  .term::before{content:'> '}
  .term::after{content:'_';animation:b 1s steps(2) infinite;color:var(--cyan)}
  @keyframes b{50%{opacity:0}}
</style>
</head>
<body>
  <div class="code">404</div>
  <h1>Risorsa non trovata</h1>
  <p>La pagina che stai cercando non esiste, è stata rimossa o non è mai stata pubblicata. Torna alla home o aprici una segnalazione.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">↩ HOME</a>
    <a href="mailto:info@berensoftware.com" class="btn btn-secondary">CONTATTACI</a>
  </div>
  <div class="term">connection_lost: route_not_found</div>
</body>
</html>
