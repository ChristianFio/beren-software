<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafbff"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.2" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#635bff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#635bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#00d4c1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00d4c1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="0.6" cy="0.6" r="0.45">
      <stop offset="0%" stop-color="#ff5996" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff5996" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#635bff"/>
      <stop offset="50%" stop-color="#9d6bff"/>
      <stop offset="100%" stop-color="#00d4c1"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#cbd6e2" stroke-opacity="0.25" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <rect width="1200" height="630" fill="url(#g3)"/>

  <!-- Logo block -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="10" fill="#0a2540"/>
    <path d="M28 12l16 9.2v13.6L28 44 12 34.8V21.2z" fill="none" stroke="#635bff" stroke-width="3" stroke-linejoin="round"/>
    <text x="78" y="38" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#0a2540" letter-spacing="-0.5">
      Beren<tspan fill="#635bff">.</tspan>Software
    </text>
  </g>

  <!-- Tagline -->
  <text x="80" y="290" font-family="Inter, sans-serif" font-size="84" font-weight="800" fill="#0a2540" letter-spacing="-2.5">Mission-critical IT,</text>
  <text x="80" y="386" font-family="Inter, sans-serif" font-size="84" font-weight="800" fill="url(#title)" letter-spacing="-2.5">delivered.</text>

  <!-- Subtitle -->
  <text x="80" y="446" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="#3d4d63">System Integration · VDI · AI · Cybersecurity</text>

  <!-- Compliance badges -->
  <g transform="translate(80, 500)" font-family="JetBrains Mono, monospace" font-size="16" font-weight="600">
    <rect x="0" y="0" width="100" height="38" rx="6" fill="#f1f0ff" stroke="#635bff" stroke-opacity="0.25"/>
    <text x="50" y="24" fill="#635bff" text-anchor="middle">GDPR</text>

    <rect x="115" y="0" width="100" height="38" rx="6" fill="#f1f0ff" stroke="#635bff" stroke-opacity="0.25"/>
    <text x="165" y="24" fill="#635bff" text-anchor="middle">NIS2</text>

    <rect x="230" y="0" width="100" height="38" rx="6" fill="#f1f0ff" stroke="#635bff" stroke-opacity="0.25"/>
    <text x="280" y="24" fill="#635bff" text-anchor="middle">DORA</text>

    <rect x="345" y="0" width="160" height="38" rx="6" fill="#f1f0ff" stroke="#635bff" stroke-opacity="0.25"/>
    <text x="425" y="24" fill="#635bff" text-anchor="middle">ISO 27001</text>
  </g>

  <!-- Bottom-right meta -->
  <g transform="translate(1120, 580)" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="16" fill="#697386">
    <text>// MADE IN EU</text>
  </g>
</svg>
